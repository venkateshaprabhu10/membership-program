spring.application.name=firstclub-membership
spring.datasource.url=jdbc:h2:mem:firstclubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

brand.name=FirstClub
brand.slug=firstclub
brand.currency=INR
brand.perk-stacking-strategy=UNION_MAX_VALUE

logging.level.com.venkateshaprabhu.membership=DEBUG